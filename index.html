<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Training Dashboard</title>
  
  <!-- Corrected CSS path -->
  <link rel="stylesheet" href="CSS/style.css" />

  <!-- Animate.css for animations -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>

  <!-- Hero Section -->
  <div class="hero animate__animated animate__fadeInDown">
    <h1>📚 Training Dashboard</h1>
    <p class="animate__animated animate__fadeInUp animate__delay-1s">
      Explore upcoming training sessions and resources.
    </p>
  </div>

  <!-- Cards Container -->
  <div id="cards-container" class="cards-container">
    <!-- Cards will be injected here -->
  </div>

  <!-- Footer -->
  <footer class="footer animate__animated animate__fadeIn animate__delay-4s">
    © 2026 Training Dashboard | Powered by Supabase
  </footer>

  <!-- Supabase Script -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    // Supabase credentials
    const SUPABASE_URL = "https://qhbvriwrenqpvbxyfema.supabase.co";
    const SUPABASE_KEY = "sb_publishable_xEfbkm_GZANoTGDdJyMYUw_ZtW8mNiD";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadTrainings() {
      const { data, error } = await supabase
        .from("training")
        .select("*")
        .order("training_date", { ascending: true });

      const container = document.getElementById("cards-container");
      container.innerHTML = "";

      if (error) {
        console.error("Error fetching trainings:", error);
        container.innerHTML = `<p style="color:red;">⚠️ Failed to load trainings. Check console for details.</p>`;
        return;
      }

      data.forEach((row, index) => {
        const delayClass = `animate__delay-${Math.min(index + 1, 4)}s`;
        const card = document.createElement("div");
        card.className = `card animate__animated animate__fadeInUp ${delayClass}`;

        card.innerHTML = `
          <h2>${row.training_name}</h2>
          <p>${row.description}</p>
          <p class="date">📅 ${row.training_date}</p>
          <a href="${row.training_link}" target="_blank" class="btn">View Training</a>
        `;
        container.appendChild(card);
      });
    }

    window.addEventListener("DOMContentLoaded", loadTrainings);
  </script>
</body>
</html>
